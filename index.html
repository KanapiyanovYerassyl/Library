<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <section class="header">
        <div class="header-wrapper">
            <h3>Personal Library</h3>
            <button>Log in</button>
        </div>
    </section>


    <section class="main-body">
        <div class="main-body-wrapper">
            <div>
                <button id="add-book-button">Add book +</button>
            </div>
            <div class="books">
                
            </div>
        </div>
    </section>


    <footer class="footer">
        <h4>Copyright @ <span>2026</span> KanapiyanovYerassyl</h4>
    </footer>


    <dialog id="add-book-dialog">
        <form name="dialog-form" id="dialog-form" method="dialog">
            <div class="input">
                <label for="title">Title: </label>
                <input autofocus type="text" name="title" id="title" required />
            </div>

            <div class="input">
                <label for="author">Author: </label>
                <input type="text" name="author" id="author" required />
            </div>

            <div class="input">
                <label for="pages">Number of pages: </label>
                <input type="number" name="pages" id="pages" required />
            </div>

            <div class="input-checkbox">
                <label for="read">Have you read it?</label>
                <input type="checkbox" name="read" id="read">
            </div>
            
            <menu>
                <button id="cancel" type="reset">Cancel</button>
                <button id="submit" type="submit">Confirm</button>
            </menu>
        </form>
    </dialog>
</body>
</html>
